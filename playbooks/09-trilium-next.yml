---
###############################################################################
# TriliumNext (rootless podman + quadlet, user-scoped)
###############################################################################
- name: TriliumNext | Set derived vars / defaults
  ansible.builtin.set_fact:
    TRILIUM_HOST: "{{ TRILIUM_HOST | default('trilium-next.' ~ DOMAIN) }}"

- name: TriliumNext | Ensure service user exists
  ansible.builtin.user:
    name: "{{ TRILIUM_USER }}"
    home: "/home/{{ TRILIUM_USER }}"
    shell: /bin/bash
    create_home: true

- name: TriliumNext | Get UID/GID from system
  ansible.builtin.getent:
    database: passwd
    key: "{{ TRILIUM_USER }}"

- name: TriliumNext | Set UID/GID facts
  ansible.builtin.set_fact:
    TRILIUM_UID: "{{ getent_passwd[TRILIUM_USER][1] }}"
    TRILIUM_GID: "{{ getent_passwd[TRILIUM_USER][2] }}"

# - name: TriliumNext | Enable linger
#   ansible.builtin.stat:
#     path: "/var/lib/systemd/linger/{{ TRILIUM_USER }}"
#   register: trilium_linger_file

# - name: TriliumNext | Turn on linger if missing
#   ansible.builtin.command:
#     cmd: "loginctl enable-linger {{ TRILIUM_USER }}"
#   when: not trilium_linger_file.stat.exists
#   changed_when: true

- name: TriliumNext | Ensure data directory exists
  ansible.builtin.file:
    path: "{{ TRILIUM_DATA_DIR }}"
    state: directory
    owner: "{{ TRILIUM_USER }}"
    group: "{{ TRILIUM_USER }}"
    mode: "0750"

- name: TriliumNext | Ensure Quadlet directory exists
  ansible.builtin.file:
    path: "/home/{{ TRILIUM_USER }}/.config/containers/systemd"
    state: directory
    owner: "{{ TRILIUM_USER }}"
    group: "{{ TRILIUM_USER }}"
    mode: "0755"

- name: TriliumNext | Write Quadlet pod file
  ansible.builtin.copy:
    dest: "/home/{{ TRILIUM_USER }}/.config/containers/systemd/trilium-next.pod"
    owner: "{{ TRILIUM_USER }}"
    group: "{{ TRILIUM_USER }}"
    mode: "0644"
    content: |
      [Pod]
      PodName=trilium_next_pod
      PublishPort=127.0.0.1:{{ TRILIUM_HOST_PORT }}:{{ TRILIUM_CONTAINER_PORT }}

- name: TriliumNext | Write Quadlet container file
  ansible.builtin.copy:
    dest: "/home/{{ TRILIUM_USER }}/.config/containers/systemd/trilium-next.container"
    owner: "{{ TRILIUM_USER }}"
    group: "{{ TRILIUM_USER }}"
    mode: "0644"
    content: |
      [Container]
      ContainerName=trilium-next
      Image={{ TRILIUM_IMAGE }}
      Pod=trilium-next.pod

      Environment=USER_UID={{ TRILIUM_UID }}
      Environment=USER_GID={{ TRILIUM_GID }}

      Volume={{ TRILIUM_DATA_DIR }}:/home/node/trilium-data:Z

      [Service]
      Restart=always

- name: TriliumNext | systemd --user daemon-reload (via machine bridge)
  ansible.builtin.command:
    cmd: "systemctl --machine={{ TRILIUM_USER }}@.host --user daemon-reload"
  changed_when: false

- name: TriliumNext | Wait for quadlet to generate units
  ansible.builtin.command:
    cmd: >-
      systemctl --machine={{ TRILIUM_USER }}@.host --user
      list-unit-files
  register: trilium_unit_files
  changed_when: false
  until:
    - "'trilium-next-pod.service' in trilium_unit_files.stdout"
    - "'trilium-next.service' in trilium_unit_files.stdout"
  retries: 10
  delay: 1

- name: TriliumNext | Start pod service
  ansible.builtin.command:
    cmd: >-
      systemctl --machine={{ TRILIUM_USER }}@.host --user
      start trilium-next-pod.service
  changed_when: false

- name: TriliumNext | Start container service
  ansible.builtin.command:
    cmd: >-
      systemctl --machine={{ TRILIUM_USER }}@.host --user
      start trilium-next.service
  changed_when: false

# Gratuitus extra checks to verify that the expected unit files were generated by the quadlet
- name: TriliumNext | Verify generated unit exists
  ansible.builtin.command:
    cmd: >-
      systemctl --machine={{ TRILIUM_USER }}@.host --user
      list-unit-files
  register: trilium_unit_files
  changed_when: false

- name: TriliumNext | Fail if trilium-next.service was not generated
  ansible.builtin.fail:
    msg: "Quadlet did not generate trilium-next.service; check pod/container quadlet Pod= reference and user journal."
  when: "'trilium-next.service' not in trilium_unit_files.stdout"

##########################################

- name: TriliumNext | Write nginx vhost (replaces placeholder)
  block:
    - name: TriliumNext | Remove old placeholder vhost if present
      ansible.builtin.file:
        path: "/etc/nginx/conf.d/{{ TRILIUM_HOST }}.conf"
        state: absent

    - name: TriliumNext | Install vhost
      ansible.builtin.copy:
        dest: "/etc/nginx/conf.d/{{ TRILIUM_HOST }}.conf"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Redirect http to https
          server {
              listen {{ WG_SERVER_IP }}:80;
              server_name {{ TRILIUM_HOST }};
              return 301 https://$host$request_uri;
          }

          server {
              listen {{ WG_SERVER_IP }}:443 ssl;
              http2 on;
              server_name {{ TRILIUM_HOST }};

              include /etc/nginx/default.d/*.conf;
              ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
              ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;
              access_log /var/log/nginx/{{ TRILIUM_HOST }}_access.log main;
              error_log  /var/log/nginx/{{ TRILIUM_HOST }}_error.log warn;

              client_max_body_size 0;
              underscores_in_headers on;

            location / {
                proxy_pass http://127.0.0.1:8080/;
                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
            }
          }

    - name: TriliumNext | nginx config test
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: TriliumNext | Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
  
