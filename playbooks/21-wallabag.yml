---
- name: "Wallabag | Set derived vars / defaults"
  ansible.builtin.set_fact:
    WALLABAG_USER: "{{ WALLABAG_USER | default('wallabag') }}"
    WALLABAG_CONTAINER_NAME: "{{ WALLABAG_CONTAINER_NAME | default('wallabag') }}"
    WALLABAG_IMAGE: "{{ WALLABAG_IMAGE | default('docker.io/wallabag/wallabag:latest') }}"

    WALLABAG_ROOT: "{{ WALLABAG_ROOT | default('/opt/wallabag') }}"
    WALLABAG_ENV_DIR: "{{ WALLABAG_ENV_DIR | default('/etc/wallabag') }}"
    WALLABAG_ENV_FILE: "{{ WALLABAG_ENV_FILE | default('/etc/wallabag/wallabag.env') }}"
    WALLABAG_QUADLET_DIR: "/home/{{ WALLABAG_USER }}/.config/containers/systemd"

    WALLABAG_CONTAINER_WRITE_UID: "{{ WALLABAG_CONTAINER_WRITE_UID | default(65534) }}"
    WALLABAG_CONTAINER_WRITE_GID: "{{ WALLABAG_CONTAINER_WRITE_GID | default(65534) }}"

    WALLABAG_HOST: "{{ WALLABAG_HOST | default('wallabag.' ~ DOMAIN) }}"
    WALLABAG_PORT: "{{ WALLABAG_PORT | default(9696) | int }}"
    WALLABAG_DB_HOST: "{{ WALLABAG_DB_HOST | default('host.containers.internal') }}"
    WALLABAG_DB_PORT: "{{ WALLABAG_DB_PORT | default(5432) | int }}"
    WALLABAG_DB_NAME: "{{ WALLABAG_DB_NAME | default('wallabag') }}"
    WALLABAG_DB_USER: "{{ WALLABAG_DB_USER | default('wallabag') }}"
    WALLABAG_DB_PASSWORD: "{{ WALLABAG_DB_PASSWORD | default('CHANGE_ME') }}"
    WALLABAG_TABLE_PREFIX: "{{ WALLABAG_TABLE_PREFIX | default('wallabag_') }}"
    WALLABAG_POPULATE_DATABASE: "{{ WALLABAG_POPULATE_DATABASE | default('True') }}"
    WALLABAG_FROM_EMAIL: "{{ WALLABAG_FROM_EMAIL | default('wallabag@example.com') }}"
    WALLABAG_SERVER_NAME: "{{ WALLABAG_SERVER_NAME | default('Wallabag') }}"

- name: "Wallabag | Ensure service user exists"
  ansible.builtin.user:
    name: "{{ WALLABAG_USER }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: "Wallabag | Get UID for service user"
  ansible.builtin.command: "id -u {{ WALLABAG_USER }}"
  register: wallabag_uid
  changed_when: false

- name: "Wallabag | Ensure persistent directories exist"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ WALLABAG_ROOT }}", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ WALLABAG_ROOT }}/data", owner: "{{ WALLABAG_USER }}", group: "{{ WALLABAG_USER }}", mode: "0750" }
    - { path: "{{ WALLABAG_ROOT }}/images", owner: "{{ WALLABAG_USER }}", group: "{{ WALLABAG_USER }}", mode: "0750" }
    - { path: "{{ WALLABAG_ENV_DIR }}", owner: "root", group: "{{ WALLABAG_USER }}", mode: "0750" }
    - { path: "{{ WALLABAG_QUADLET_DIR }}", owner: "{{ WALLABAG_USER }}", group: "{{ WALLABAG_USER }}", mode: "0750" }

####################################################################
# Fix permissions for rootless Podman bind mounts
####################################################################

- name: "Wallabag | Allow container writes to bind mounts (SELinux persistent)"
  become: true
  ansible.builtin.command:
    argv:
      - semanage
      - fcontext
      - -a
      - -t
      - container_file_t
      - "{{ item }}(/.*)?"
  loop:
    - "{{ WALLABAG_ROOT }}/data"
    - "{{ WALLABAG_ROOT }}/images"
  failed_when: false
  changed_when: false

- name: "Wallabag | Restore SELinux labels"
  become: true
  ansible.builtin.command:
    argv:
      - restorecon
      - -Rv
      - "{{ item }}"
  loop:
    - "{{ WALLABAG_ROOT }}/data"
    - "{{ WALLABAG_ROOT }}/images"

- name: "Wallabag | Fix writable bind-mount ownership for rootless Podman"
  become: true
  become_user: "{{ WALLABAG_USER }}"
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - -R
      - "{{ WALLABAG_CONTAINER_WRITE_UID }}:{{ WALLABAG_CONTAINER_WRITE_GID }}"
      - "{{ item }}"
  loop:
    - "{{ WALLABAG_ROOT }}/data"
    - "{{ WALLABAG_ROOT }}/images"

- name: "Wallabag | Ensure writable directory modes"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0770"
  loop:
    - "{{ WALLABAG_ROOT }}/data"
    - "{{ WALLABAG_ROOT }}/images"

- name: "Wallabag | Write environment file"
  ansible.builtin.copy:
    dest: "{{ WALLABAG_ENV_FILE }}"
    owner: root
    group: "{{ WALLABAG_USER }}"
    mode: "0640"
    content: |
      # Wallabag docker image environment variables (see wallabag/docker README). :contentReference[oaicite:3]{index=3}

      SYMFONY__ENV__FOSUSER_REGISTRATION=true
      SYMFONY__ENV__FOSUSER_CONFIRMATION=false

      # Database (host Postgres)
      SYMFONY__ENV__DATABASE_DRIVER=pdo_pgsql
      SYMFONY__ENV__DATABASE_HOST={{ WALLABAG_DB_HOST }}
      SYMFONY__ENV__DATABASE_PORT={{ WALLABAG_DB_PORT }}
      SYMFONY__ENV__DATABASE_NAME={{ WALLABAG_DB_NAME }}
      SYMFONY__ENV__DATABASE_USER={{ WALLABAG_DB_USER }}
      SYMFONY__ENV__DATABASE_PASSWORD={{ WALLABAG_DB_PASSWORD }}
      SYMFONY__ENV__DATABASE_TABLE_PREFIX={{ WALLABAG_TABLE_PREFIX }}

      # Required for correct redirects / absolute URLs
      SYMFONY__ENV__DOMAIN_NAME=https://{{ WALLABAG_HOST }}
      SYMFONY__ENV__SERVER_NAME={{ WALLABAG_SERVER_NAME }}

      # Mail (minimal defaults; set to your real SMTP if you want outbound mail)
      SYMFONY__ENV__MAILER_DSN=smtp://127.0.0.1
      SYMFONY__ENV__FROM_EMAIL={{ WALLABAG_FROM_EMAIL }}

      # New DB bootstrap
      POPULATE_DATABASE={{ WALLABAG_POPULATE_DATABASE }}

- name: Wallabag | Derive runtime dir for user systemd (root controlling rootless)
  block:
    - name: Wallabag | Get UID of {{ WALLABAG_USER }}
      ansible.builtin.command: "id -u {{ WALLABAG_USER }}"
      register: wallabag_uid
      changed_when: false

    - name: Wallabag | Set runtime facts
      ansible.builtin.set_fact:
        WALLABAG_UID: "{{ wallabag_uid.stdout | trim }}"
        WALLABAG_XDG_RUNTIME_DIR: "/run/user/{{ wallabag_uid.stdout | trim }}"
        WALLABAG_DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ wallabag_uid.stdout | trim }}/bus"

    - name: Wallabag | Ensure XDG runtime dir exists
      ansible.builtin.file:
        path: "{{ WALLABAG_XDG_RUNTIME_DIR }}"
        state: directory
        owner: "{{ WALLABAG_USER }}"
        group: "{{ WALLABAG_USER }}"
        mode: "0700"

    - name: Wallabag | Ensure user manager is started (user@UID)
      ansible.builtin.systemd:
        name: "user@{{ WALLABAG_UID }}.service"
        state: started
  become: true

####################################################################
# Postgres
#####################################################################

- name: "Wallabag | Postgres: allow access + create role/db (host Postgres)"
  block:
    - name: "Wallabag | Postgres: discover pg_hba.conf path"
      become: true
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ DBPORT | int }} -U postgres -tAc "SHOW hba_file;"
      environment:
        PGPASSWORD: "{{ DBSUPERPASS }}"
      register: wallabag_hba_file
      changed_when: false

    # Optional: allow a known podman subnet (only if you track it)
    - name: "Wallabag | Postgres: allow podman subnet (wallabag -> wallabag)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ wallabag_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ WALLABAG_DB_NAME }}"
        users: "{{ WALLABAG_DB_USER }}"
        source: "{{ WALLABAG_PODMAN_SUBNET }}"
        method: scram-sha-256
        state: present
      when: WALLABAG_PODMAN_SUBNET is defined

    - name: "Wallabag | Postgres: allow podman subnet (postgres -> wallabag db admin)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ wallabag_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ WALLABAG_DB_NAME }}"
        users: postgres
        source: "{{ WALLABAG_PODMAN_SUBNET }}"
        method: scram-sha-256
        state: present
      when: WALLABAG_PODMAN_SUBNET is defined

    # Always allow samehost (matches your existing pattern)
    - name: "Wallabag | Postgres: allow samehost (wallabag -> wallabag)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ wallabag_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ WALLABAG_DB_NAME }}"
        users: "{{ WALLABAG_DB_USER }}"
        source: samehost
        method: scram-sha-256
        state: present

    - name: "Wallabag | Postgres: allow samehost (postgres -> wallabag db admin)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ wallabag_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ WALLABAG_DB_NAME }}"
        users: postgres
        source: samehost
        method: scram-sha-256
        state: present

    - name: "Wallabag | Postgres: reload config"
      become: true
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ DBPORT | int }} -U postgres -tAc "SELECT pg_reload_conf();"
      environment:
        PGPASSWORD: "{{ DBSUPERPASS }}"
      changed_when: false

    - name: "Wallabag | Postgres: ensure role exists"
      community.postgresql.postgresql_user:
        login_host: "127.0.0.1"
        login_port: "{{ DBPORT | int }}"
        login_user: postgres
        login_password: "{{ DBSUPERPASS }}"
        name: "{{ WALLABAG_DB_USER }}"
        password: "{{ WALLABAG_DB_PASSWORD }}"
        encrypted: true
        state: present

    - name: "Wallabag | Postgres: ensure database exists"
      community.postgresql.postgresql_db:
        login_host: "127.0.0.1"
        login_port: "{{ DBPORT | int }}"
        login_user: postgres
        login_password: "{{ DBSUPERPASS }}"
        name: "{{ WALLABAG_DB_NAME }}"
        owner: "{{ WALLABAG_DB_USER }}"
        state: present

- name: "Wallabag | Install quadlet container unit"
  ansible.builtin.copy:
    dest: "{{ WALLABAG_QUADLET_DIR }}/{{ WALLABAG_CONTAINER_NAME }}.container"
    owner: "{{ WALLABAG_USER }}"
    group: "{{ WALLABAG_USER }}"
    mode: "0644"
    content: |
      [Unit]
      Description=Wallabag (rootless Podman)

      [Container]
      ContainerName={{ WALLABAG_CONTAINER_NAME }}
      Image={{ WALLABAG_IMAGE }}

      # Bind only on localhost; nginx will reverse-proxy.
      PublishPort=127.0.0.1:{{ WALLABAG_PORT }}:80

      # Persistent storage (as recommended by wallabag/docker)
      Volume={{ WALLABAG_ROOT }}/data:/var/www/wallabag/data:Z
      Volume={{ WALLABAG_ROOT }}/images:/var/www/wallabag/web/assets/images:Z

      EnvironmentFile={{ WALLABAG_ENV_FILE }}

      # IMPORTANT for host-Postgres-on-localhost with rootless networking:
      # allow_host_loopback enables reaching host loopback via host.containers.internal / 10.0.2.2. :contentReference[oaicite:4]{index=4}
      Network=slirp4netns:allow_host_loopback=true

      [Service]
      Restart=always
      TimeoutStartSec=300

      [Install]
      WantedBy=default.target

- name: "Wallabag | systemd --user daemon-reload"
  become: true
  become_user: "{{ WALLABAG_USER }}"
  ansible.builtin.command: "systemctl --user daemon-reload"
  environment:
    XDG_RUNTIME_DIR: "{{ WALLABAG_XDG_RUNTIME_DIR }}"
    DBUS_SESSION_BUS_ADDRESS: "{{ WALLABAG_DBUS_SESSION_BUS_ADDRESS }}"
  changed_when: false


- name: "Wallabag | Start container service (generated; do not enable)"
  block:
    - name: "Wallabag | Start service"
      ansible.builtin.command:
        cmd: >-
          systemctl --machine={{ WALLABAG_USER }}@.host --user
          start wallabag.service
      changed_when: false

- name: "Wallabag | DB migrate (retry; safe if already up to date)"
  block:
    - name: "Wallabag | Run migrations (retry)"
      become: true
      become_user: "{{ WALLABAG_USER }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ wallabag_uid.stdout | trim }}"
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ wallabag_uid.stdout | trim }}/bus"
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - "{{ WALLABAG_CONTAINER_NAME }}"
          - sh
          - -lc
          - "php bin/console doctrine:migrations:migrate --env=prod -n"
      register: wallabag_migrate
      changed_when: false
      retries: 6
      delay: 10
      until: wallabag_migrate.rc == 0

    - name: "Wallabag | Clear cache after migrations (retry)"
      become: true
      become_user: "{{ WALLABAG_USER }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ wallabag_uid.stdout | trim }}"
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ wallabag_uid.stdout | trim }}/bus"
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - "{{ WALLABAG_CONTAINER_NAME }}"
          - sh
          - -lc
          - "php bin/console cache:clear --env=prod -n"
      register: wallabag_cache_clear
      changed_when: false
      retries: 6
      delay: 5
      until: wallabag_cache_clear.rc == 0


- name: "Wallabag | Install nginx vhost"
  ansible.builtin.copy:
    dest: "/etc/nginx/conf.d/{{ WALLABAG_HOST }}.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      server {
          listen {{ WG_SERVER_IP }}:80;
          server_name {{ WALLABAG_HOST }};
          return 301 https://$host$request_uri;
      }

      server {
          listen {{ WG_SERVER_IP }}:443 ssl;
          http2 on;
          server_name {{ WALLABAG_HOST }};

          include /etc/nginx/default.d/*.conf;
          ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
          ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;
          access_log  /var/log/nginx/{{ WALLABAG_HOST }}_access.log  main;
          error_log   /var/log/nginx/{{ WALLABAG_HOST }}_error.log;

        location / {
            proxy_pass http://127.0.0.1:{{ WALLABAG_PORT }};
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 50m;
            proxy_read_timeout 300;
        }
      }

- name: "Wallabag | Reload nginx"
  ansible.builtin.service:
    name: nginx
    state: reloaded