###############################################################################
# User + dirs
###############################################################################

# - name: Firefly III | Ensure service user exists
#   ansible.builtin.user:
#     name: "{{ FIREFLY_USER }}"
#     home: "/home/{{ FIREFLY_USER }}"
#     shell: /bin/bash
#     create_home: true

- name: Firefly III | Ensure data directory exists
  ansible.builtin.file:
    path: "{{ FIREFLY_DATA_DIR }}"
    state: directory
    owner: "{{ FIREFLY_USER }}"
    group: "{{ FIREFLY_USER }}"
    mode: "0750"

- name: Firefly III | Ensure env directory exists
  ansible.builtin.file:
    path: "{{ FIREFLY_ENV_DIR }}"
    state: directory
    owner: root
    group: "{{ FIREFLY_USER }}"
    mode: "0750"
  become: true

- name: "Firefly III | Ensure upload directory exists"
  ansible.builtin.file:
    path: "{{ FIREFLY_DATA_DIR }}/upload"
    state: directory
    owner: "{{ FIREFLY_USER }}"
    group: "{{ FIREFLY_USER }}"
    mode: "0770"
  become: true

- name: Firefly III | Ensure Quadlet directory exists
  ansible.builtin.file:
    path: "{{ FIREFLY_QUADLET_DIR }}"
    state: directory
    owner: "{{ FIREFLY_USER }}"
    group: "{{ FIREFLY_USER }}"
    mode: "0755"

###############################################################################
# Firefly env file
###############################################################################

- name: Firefly III | Write env file
  ansible.builtin.copy:
    dest: "{{ FIREFLY_ENV_FILE }}"
    owner: root
    group: "{{ FIREFLY_USER }}"
    mode: "0640"
    content: |
      # Core
      APP_ENV=production
      APP_DEBUG=false
      APP_KEY={{ FIREFLY_APP_KEY }}

      # Used in URL generation / validation behind reverse proxy
      APP_URL=https://{{ FIREFLY_HOST }}

      # Reverse proxy friendliness (recommended in upstream env example)
      TRUSTED_PROXIES=**

      # Database (PostgreSQL)
      DB_CONNECTION=pgsql
      DB_HOST=host.containers.internal
      DB_PORT={{ DBPORT }}
      DB_DATABASE={{ FIREFLY_DB_NAME }}
      DB_USERNAME={{ FIREFLY_DB_USER }}
      DB_PASSWORD={{ FIREFLY_DB_PASSWORD }}

      # Optional timezone (override if you like)
      TZ={{ FIREFLY_TZ | default('America/New_York') }}
  become: true

- name: "Firefly III | DEBUG | Read back env file immediately after write"
  become: true
  ansible.builtin.command: cat "{{ FIREFLY_ENV_FILE }}"
  register: firefly_env_cat
  changed_when: false

- name: "Firefly III | DEBUG | Env file content (post-write)"
  ansible.builtin.debug:
    var: firefly_env_cat.stdout_lines

###############################################################################
# Quadlet: pod + container
###############################################################################

- name: Firefly III | Write Quadlet pod file
  ansible.builtin.copy:
    dest: "{{ FIREFLY_QUADLET_DIR }}/firefly3.pod"
    owner: "{{ FIREFLY_USER }}"
    group: "{{ FIREFLY_USER }}"
    mode: "0644"
    content: |
      [Pod]
      PodName=firefly3.pod
      PublishPort=127.0.0.1:{{ FIREFLY_HOST_PORT }}:{{ FIREFLY_CONTAINER_PORT }}

- name: Firefly III | Write Quadlet container file
  ansible.builtin.copy:
    dest: "{{ FIREFLY_QUADLET_DIR }}/firefly3.container"
    owner: "{{ FIREFLY_USER }}"
    group: "{{ FIREFLY_USER }}"
    mode: "0644"
    content: |
      [Container]
      ContainerName=firefly3
      Image={{ FIREFLY_IMAGE }}
      Pod=firefly3.pod

      EnvironmentFile={{ FIREFLY_ENV_FILE }}

      # Persistent uploads (this is the usual mount point used in container setups)
      Volume={{ FIREFLY_DATA_DIR }}/upload:/var/www/html/storage/upload

      # If your host Postgres only listens on 127.0.0.1, rootless networking may still reach it via
      # host.containers.internal (recommended). If that fails, the common fallback is DB_HOST=10.0.2.2.

      [Service]
      Restart=always

###############################################################################
# Firefly III | Root controlling rootless (Quadlet-generated; do not enable)
###############################################################################

- name: "Firefly III | Derive runtime dir for user systemd (root controlling rootless)"
  block:
    - name: "Firefly III | Get UID of {{ FIREFLY_USER }}"
      ansible.builtin.command: "id -u {{ FIREFLY_USER }}"
      register: firefly_uid
      changed_when: false

    - name: "Firefly III | Set runtime facts"
      ansible.builtin.set_fact:
        FIREFLY_UID: "{{ firefly_uid.stdout | trim }}"
        FIREFLY_XDG_RUNTIME_DIR: "/run/user/{{ firefly_uid.stdout | trim }}"
        FIREFLY_DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ firefly_uid.stdout | trim }}/bus"

    - name: "Firefly III | Ensure XDG runtime dir exists"
      ansible.builtin.file:
        path: "{{ FIREFLY_XDG_RUNTIME_DIR }}"
        state: directory
        owner: "{{ FIREFLY_USER }}"
        group: "{{ FIREFLY_USER }}"
        mode: "0700"

    - name: "Firefly III | Assert user manager responds"
      ansible.builtin.command:
        cmd: >-
          systemctl --user -M {{ FIREFLY_USER }}@.host is-active default.target
      become: true
      changed_when: false
      register: firefly_user_mgr
      failed_when: firefly_user_mgr.rc != 0

  become: true

- name: "Firefly III | systemd --user daemon-reload (via machine context)"
  ansible.builtin.command:
    cmd: >-
      systemctl --user -M {{ FIREFLY_USER }}@.host daemon-reload
  become: true
  changed_when: false


- name: "Firefly III | Debug: list quadlet files"
  ansible.builtin.command: "ls -la {{ FIREFLY_QUADLET_DIR }}"
  become: true
  changed_when: false
  register: firefly_quadlet_ls

- name: "Firefly III | Show quadlet dir listing"
  ansible.builtin.debug:
    var: firefly_quadlet_ls.stdout_lines

