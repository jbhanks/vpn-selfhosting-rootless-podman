#       This usually means quadlet isn't generating units from your *.pod/*.container files.


- name: "Firefly III | Start services (generated; do not enable)"
  block:
  - name: "Firefly III | Start pod (generated; do not enable)"
    ansible.builtin.command:
      cmd: >-
        systemctl --user -M {{ FIREFLY_USER }}@.host start firefly3-pod.service
    become: true
    changed_when: false

  - name: "Firefly III | Start container (generated; do not enable)"
    ansible.builtin.command:
      cmd: >-
        systemctl --user -M {{ FIREFLY_USER }}@.host start firefly3.service
    become: true
    changed_when: false

  rescue:
    - name: "Firefly III | Status (debug)"
      ansible.builtin.command:
        cmd: >-
          systemctl --user -M {{ FIREFLY_USER }}@.host
          status firefly3.service firefly3-pod.service --no-pager
      changed_when: false
      failed_when: false
      register: firefly_status

    - name: "Firefly III | Journal (debug)"
      ansible.builtin.command:
        cmd: >-
          journalctl --user -M {{ FIREFLY_USER }}@.host
          -xeu firefly3.service --no-pager
      changed_when: false
      failed_when: false
      register: firefly_journal

    - name: "Firefly III | Show status"
      ansible.builtin.debug:
        var: firefly_status.stdout_lines

    - name: "Firefly III | Show journal"
      ansible.builtin.debug:
        var: firefly_journal.stdout_lines

    - name: "Firefly III | Fail after diagnostics"
      ansible.builtin.fail:
        msg: "Firefly III service failed to start; see debug output above."

####################################################################
# Postgres
#####################################################################

- name: "Firefly | Postgres: allow access + create role/db (host Postgres)"
  block:
    - name: "Firefly | Postgres: discover pg_hba.conf path"
      become: true
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ DBPORT | int }} -U postgres -tAc "SHOW hba_file;"
      environment:
        PGPASSWORD: "{{ DBSUPERPASS }}"
      register: firefly_hba_file
      changed_when: false

    # Optional: allow a known podman subnet (only if you track it)
    - name: "Firefly | Postgres: allow podman subnet (firefly -> firefly)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ firefly_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ FIREFLY_DB_NAME }}"
        users: "{{ FIREFLY_DB_USER }}"
        source: "{{ FIREFLY_PODMAN_SUBNET }}"
        method: scram-sha-256
        state: present
      when: FIREFLY_PODMAN_SUBNET is defined

    - name: "Firefly | Postgres: allow podman subnet (postgres -> firefly db admin)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ firefly_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ FIREFLY_DB_NAME }}"
        users: postgres
        source: "{{ FIREFLY_PODMAN_SUBNET }}"
        method: scram-sha-256
        state: present
      when: FIREFLY_PODMAN_SUBNET is defined

    # Always allow samehost (matches your existing pattern)
    - name: "Firefly | Postgres: allow samehost (firefly -> firefly)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ firefly_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ FIREFLY_DB_NAME }}"
        users: "{{ FIREFLY_DB_USER }}"
        source: samehost
        method: scram-sha-256
        state: present

    - name: "Firefly | Postgres: allow samehost (postgres -> firefly db admin)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ firefly_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ FIREFLY_DB_NAME }}"
        users: postgres
        source: samehost
        method: scram-sha-256
        state: present

    - name: "Firefly | Postgres: reload config"
      become: true
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ DBPORT | int }} -U postgres -tAc "SELECT pg_reload_conf();"
      environment:
        PGPASSWORD: "{{ DBSUPERPASS }}"
      changed_when: false

    - name: "Firefly | Postgres: ensure role exists"
      community.postgresql.postgresql_user:
        login_host: "127.0.0.1"
        login_port: "{{ DBPORT | int }}"
        login_user: postgres
        login_password: "{{ DBSUPERPASS }}"
        name: "{{ FIREFLY_DB_USER }}"
        password: "{{ FIREFLY_DB_PASSWORD }}"
        encrypted: true
        state: present

    - name: "Firefly | Postgres: ensure database exists"
      community.postgresql.postgresql_db:
        login_host: "127.0.0.1"
        login_port: "{{ DBPORT | int }}"
        login_user: postgres
        login_password: "{{ DBSUPERPASS }}"
        name: "{{ FIREFLY_DB_NAME }}"
        owner: "{{ FIREFLY_DB_USER }}"
        state: present
###############################################################################
# nginx vhost
###############################################################################

- name: Firefly III | Write nginx vhost
  block:
    - name: Firefly III | Remove old placeholder vhost if present
      ansible.builtin.file:
        path: "/etc/nginx/conf.d/{{ FIREFLY_HOST }}.conf"
        state: absent

    - name: Firefly III | Install vhost
      ansible.builtin.copy:
        dest: "/etc/nginx/conf.d/{{ FIREFLY_HOST }}.conf"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Redirect http to https
          server {
              listen {{ WG_SERVER_IP }}:80;
              listen [::]:80;
              server_name {{ FIREFLY_HOST }};
              return 301 https://$host$request_uri;
          }

          server {
              listen {{ WG_SERVER_IP }}:443 ssl;
              http2 on;
              server_name {{ FIREFLY_HOST }};

              include /etc/nginx/default.d/*.conf;
              ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
              ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;
              access_log /var/log/nginx/{{ FIREFLY_HOST }}_access.log main;
              error_log  /var/log/nginx/{{ FIREFLY_HOST }}_error.log warn;

              client_max_body_size 0;
              underscores_in_headers on;

              location / {
                  proxy_pass http://127.0.0.1:{{ FIREFLY_HOST_PORT }}/;

                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-Forwarded-Port $server_port;

                  proxy_buffering off;
              }
          }

    - name: Firefly III | nginx config test
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Firefly III | Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
  become: true
