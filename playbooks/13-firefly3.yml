---
###############################################################################
# Firefly III (rootless podman + quadlet, user-scoped) + nginx vhost
###############################################################################

- name: Firefly III | Set derived vars / defaults
  ansible.builtin.set_fact:
    FIREFLY_HOST: "{{ FIREFLY_HOST | default('firefly3.' ~ DOMAIN) }}"
    FIREFLY_USER: "{{ FIREFLY_USER | default('firefly3') }}"
    FIREFLY_IMAGE: "{{ FIREFLY_IMAGE | default('docker.io/fireflyiii/core:latest') }}"

    # Host port (nginx will proxy to this). Container listens on 8080 internally.
    FIREFLY_HOST_PORT: "{{ FIREFLY_HOST_PORT | default('8484') }}"
    FIREFLY_CONTAINER_PORT: "{{ FIREFLY_CONTAINER_PORT | default('8080') }}"

    # Data / config paths (host)
    FIREFLY_DATA_DIR: "{{ FIREFLY_DATA_DIR | default('/opt/firefly3') }}"
    FIREFLY_ENV_DIR: "{{ FIREFLY_ENV_DIR | default('/etc/firefly3') }}"
    FIREFLY_ENV_FILE: "{{ FIREFLY_ENV_FILE | default('/etc/firefly3/firefly.env') }}"
    FIREFLY_QUADLET_DIR: "/home/{{ FIREFLY_USER }}/.config/containers/systemd"

- name: "Firefly III | Preflight: ensure required vars exist"
  ansible.builtin.assert:
    that:
      - DOMAIN is defined
      - FIREFLY_DB_NAME is defined
      - FIREFLY_DB_USER is defined
      - FIREFLY_DB_PASSWORD is defined
      - DBPORT is defined
    fail_msg: >-
      Missing required vars. Ensure DOMAIN, FIREFLY_DB_NAME, FIREFLY_DB_USER,
      FIREFLY_DB_PASSWORD, DBPORT are present in vars.yml.

#####################################################################
# Firefly III | Debug: show FIREFLY_APP_KEY state before/after creation
#####################################################################

- name: "Firefly III | DEBUG | Pre: FIREFLY_APP_KEY status"
  ansible.builtin.debug:
    msg:
      - "FIREFLY_APP_KEY defined? {{ FIREFLY_APP_KEY is defined }}"
      - "FIREFLY_APP_KEY value: {{ FIREFLY_APP_KEY | default('<UNDEFINED>') }}"
      - "FIREFLY_APP_KEY == REPLACE_ME_APP_KEY ? {{ (FIREFLY_APP_KEY | default('')) == 'REPLACE_ME_APP_KEY' }}"
      - "Generation condition evaluates to: {{ (FIREFLY_APP_KEY is not defined) or ((FIREFLY_APP_KEY | default('')) == 'REPLACE_ME_APP_KEY') }}"

- name: "Firefly III | Generate APP_KEY (32 random bytes, base64)"
  ansible.builtin.command: openssl rand -base64 32
  register: firefly_key_cmd
  changed_when: true
  when: (FIREFLY_APP_KEY is not defined) or ((FIREFLY_APP_KEY | default('')) == 'REPLACE_ME_APP_KEY')

- name: "Firefly III | DEBUG | Post-openssl: did it run?"
  ansible.builtin.debug:
    msg:
      - "firefly_key_cmd is defined? {{ firefly_key_cmd is defined }}"
      - "openssl stdout length: {{ (firefly_key_cmd.stdout | default('')) | length }}"
      - "openssl stdout (first 8 chars): {{ (firefly_key_cmd.stdout | default(''))[:8] }}"
  when: firefly_key_cmd is defined

- name: "Firefly III | Set FIREFLY_APP_KEY fact"
  ansible.builtin.set_fact:
    FIREFLY_APP_KEY: "base64:{{ firefly_key_cmd.stdout }}"
  when: firefly_key_cmd is defined

- name: "Firefly III | DEBUG | Post-set_fact: FIREFLY_APP_KEY status"
  ansible.builtin.debug:
    msg:
      - "FIREFLY_APP_KEY defined? {{ FIREFLY_APP_KEY is defined }}"
      - "FIREFLY_APP_KEY value prefix: {{ (FIREFLY_APP_KEY | default(''))[:7] }}"
      - "FIREFLY_APP_KEY total length: {{ (FIREFLY_APP_KEY | default('')) | length }}"

#####################################################################
# Firefly III | Debug: right before writing env file
#####################################################################

- name: "Firefly III | DEBUG | Immediately before writing env file"
  ansible.builtin.debug:
    msg:
      - "FIREFLY_APP_KEY value: {{ FIREFLY_APP_KEY | default('<UNDEFINED>') }}"
      - "Rendered APP_KEY line would be: APP_KEY={{ FIREFLY_APP_KEY | default('<UNDEFINED>') }}"
  tags: [firefly_debug]

