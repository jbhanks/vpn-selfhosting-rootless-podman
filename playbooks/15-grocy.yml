##########################################
# Nginx reverse proxy vhost
##########################################

- name: Grocy | Write nginx vhost (replaces placeholder)
  block:
    - name: Grocy | Remove old placeholder vhost if present
      ansible.builtin.file:
        path: "/etc/nginx/conf.d/{{ GROCY_HOST }}.conf"
        state: absent

    - name: Grocy | Install vhost
      ansible.builtin.copy:
        dest: "/etc/nginx/conf.d/{{ GROCY_HOST }}.conf"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Redirect http to https
          server {
              listen {{ WG_SERVER_IP }}:80;
              server_name {{ GROCY_HOST }};
              return 301 https://$host$request_uri;
          }

          server {
              listen {{  WG_SERVER_IP }}:443 ssl;
              http2 on;
              server_name {{ GROCY_HOST }};

              include /etc/nginx/default.d/*.conf;
              ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
              ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;
              access_log /var/log/nginx/{{ GROCY_HOST }}_access.log main;
              error_log  /var/log/nginx/{{ GROCY_HOST }}_error.log warn;

              client_max_body_size 0;
              underscores_in_headers on;

              location / {
                  proxy_pass http://127.0.0.1:{{ GROCY_HOST_PORT }}/;

                  proxy_http_version 1.1;

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Grocy | nginx config test
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Grocy | Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
  become: true
