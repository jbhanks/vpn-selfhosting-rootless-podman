---
###############################################################################
# Grocy (rootless podman + quadlet, user-scoped)
###############################################################################
- name: Grocy | Set derived vars / defaults
  ansible.builtin.set_fact:
    GROCY_HOST: "{{ GROCY_HOST | default('grocy.' ~ DOMAIN) }}"

    # Service user + paths (aligns with your Trilium pattern)
    GROCY_USER: "{{ GROCY_USER | default('grocy') }}"
    GROCY_ROOT: "{{ GROCY_ROOT | default('/opt/grocy') }}"
    GROCY_CONFIG_DIR: "{{ GROCY_CONFIG_DIR | default(GROCY_ROOT ~ '/config') }}"
    GROCY_QUADLET_DIR: "/home/{{ GROCY_USER }}/.config/containers/systemd"

    # Image + ports (LinuxServer image maps external 9283 to internal 80)
    GROCY_IMAGE: "{{ GROCY_IMAGE | default('lscr.io/linuxserver/grocy:latest') }}"
    GROCY_HOST_PORT: "{{ GROCY_HOST_PORT | default('9283') }}"
    GROCY_CONTAINER_PORT: "{{ GROCY_CONTAINER_PORT | default('80') }}"

    # Container env
    GROCY_TZ: "{{ GROCY_TZ | default('Etc/UTC') }}"

- name: Grocy | Ensure service user exists
  ansible.builtin.user:
    name: "{{ GROCY_USER }}"
    home: "/home/{{ GROCY_USER }}"
    shell: /bin/bash
    state: present

- name: Grocy | Read user uid/gid
  ansible.builtin.getent:
    database: passwd
    key: "{{ GROCY_USER }}"

- name: Grocy | Set uid/gid facts
  ansible.builtin.set_fact:
    GROCY_UID: "{{ getent_passwd[GROCY_USER][1] }}"
    GROCY_GID: "{{ getent_passwd[GROCY_USER][2] }}"

