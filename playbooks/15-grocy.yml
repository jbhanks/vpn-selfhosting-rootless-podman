- name: Grocy | Create directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ GROCY_ROOT }}",       owner: root,          group: root,          mode: "0755" }
    - { path: "{{ GROCY_CONFIG_DIR }}", owner: "{{ GROCY_USER }}", group: "{{ GROCY_USER }}", mode: "0755" }
    - { path: "{{ GROCY_QUADLET_DIR }}", owner: "{{ GROCY_USER }}", group: "{{ GROCY_USER }}", mode: "0755" }
  become: true

- name: Grocy | Write Quadlet pod file
  ansible.builtin.copy:
    dest: "{{ GROCY_QUADLET_DIR }}/grocy.pod"
    owner: "{{ GROCY_USER }}"
    group: "{{ GROCY_USER }}"
    mode: "0644"
    content: |
      [Pod]
      PodName=grocy.pod
      PublishPort=127.0.0.1:{{ GROCY_HOST_PORT }}:{{ GROCY_CONTAINER_PORT }}

- name: Grocy | Write Quadlet container file
  ansible.builtin.copy:
    dest: "{{ GROCY_QUADLET_DIR }}/grocy.container"
    owner: "{{ GROCY_USER }}"
    group: "{{ GROCY_USER }}"
    mode: "0644"
    content: |
      [Container]
      ContainerName=grocy
      Image={{ GROCY_IMAGE }}
      Pod=grocy.pod

      Environment=PUID={{ GROCY_UID }}
      Environment=PGID={{ GROCY_GID }}
      Environment=TZ={{ GROCY_TZ }}

      Volume={{ GROCY_CONFIG_DIR }}:/config:Z

      [Service]
      Restart=always

###############################################################################
# Grocy | Root controlling rootless (Quadlet-generated; do not enable)
###############################################################################

- name: "Grocy | Derive runtime dir for user systemd (root controlling rootless)"
  block:
    - name: "Grocy | Get UID of {{ GROCY_USER }}"
      ansible.builtin.command: "id -u {{ GROCY_USER }}"
      register: grocy_uid
      changed_when: false

    - name: "Grocy | Set runtime facts"
      ansible.builtin.set_fact:
        GROCY_UID: "{{ grocy_uid.stdout | trim }}"
        GROCY_XDG_RUNTIME_DIR: "/run/user/{{ grocy_uid.stdout | trim }}"
        GROCY_DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ grocy_uid.stdout | trim }}/bus"

    - name: "Grocy | Ensure XDG runtime dir exists"
      ansible.builtin.file:
        path: "{{ GROCY_XDG_RUNTIME_DIR }}"
        state: directory
        owner: "{{ GROCY_USER }}"
        group: "{{ GROCY_USER }}"
        mode: "0700"

    - name: "Grocy | Assert user manager responds"
      ansible.builtin.command:
        cmd: >-
          systemctl --user -M {{ GROCY_USER }}@.host is-active default.target
      changed_when: false
      register: grocy_user_mgr
      failed_when: grocy_user_mgr.rc != 0

  become: true

- name: "Grocy | systemd --user daemon-reload (via machine context)"
  ansible.builtin.command:
    cmd: >-
      systemctl --user -M {{ GROCY_USER }}@.host daemon-reload
  become: true
  changed_when: false

- name: "Grocy | Start services (generated; do not enable)"
  block:
    - name: "Grocy | Start pod (generated; do not enable)"
      ansible.builtin.command:
        cmd: >-
          systemctl --user -M {{ GROCY_USER }}@.host start grocy-pod.service
      become: true
      changed_when: false

    - name: "Grocy | Start container (generated; do not enable)"
      ansible.builtin.command:
        cmd: >-
          systemctl --user -M {{ GROCY_USER }}@.host start grocy.service
      become: true
      changed_when: false

