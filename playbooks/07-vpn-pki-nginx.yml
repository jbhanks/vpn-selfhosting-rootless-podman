---
- name: "VPN PKI | Set VPN naming facts"
  ansible.builtin.set_fact:
      VPN_TLD: "{{ DOMAIN }}"
      WG_SUBNET_CIDR: "10.99.99.0/24"
      WG_SERVER_IP: "10.99.99.1"

- name: "VPN PKI | Set VPN naming facts part 2"
  ansible.builtin.set_fact:
      VPN_DOMAINS: "{{ (['main'] + APPS) | map('regex_replace', '$', '.' ~ VPN_TLD) | list + [VPN_TLD] }}"

###############################################################################
# 1) Local PKI on controller: root + intermediate + wildcard server cert
#    + trust artifacts + secure backup of root CA key + delete local root key
###############################################################################

- name: "PKI | Ensure local certificates directory structure exists"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.file:
      path: "{{ item }}"
      state: directory
      mode: "0755"
  loop:
      - "{{ playbook_dir }}/Secrets/certificates"
      - "{{ playbook_dir }}/Secrets/certificates/root"
      - "{{ playbook_dir }}/Secrets/certificates/intermediate"
      - "{{ playbook_dir }}/Secrets/certificates/clients"
      - "{{ playbook_dir }}/Secrets/certificates/server"
      - "{{ playbook_dir }}/Secrets/certificates/server/wildcard"

- name: "PKI | Ensure secure backup directory exists"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.file:
      path: "{{ SECURE_BACKUP_PATH }}/{{ DOMAIN }}-root"
      state: directory
      mode: "0700"

- name: "PKI | Generate ROOT private key (temporary local copy before secure backup)"
  delegate_to: localhost
  run_once: true
  become: false
  community.crypto.openssl_privatekey:
      path: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root-private-USB.key"
      size: 4096
      type: RSA
      cipher: auto
      passphrase: "{{ ROOT_SSL_KEY_PASSPHRASE }}"
      mode: "0600"

- name: "PKI | Generate ROOT CSR"
  delegate_to: localhost
  run_once: true
  become: false
  community.crypto.openssl_csr:
      path: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.csr"
      privatekey_path: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root-private-USB.key"
      privatekey_passphrase: "{{ ROOT_SSL_KEY_PASSPHRASE }}"
      subject:
          CN: "{{ DOMAIN }} Trust Root CA"
      mode: "0644"

- name: "PKI | Write ROOT CA extensions file"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      dest: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.ext"
      mode: "0644"
      content: |
          basicConstraints=critical,CA:TRUE
          keyUsage=critical,keyCertSign,cRLSign
          subjectKeyIdentifier=hash

- name: "PKI | Write minimal OpenSSL config for ROOT cert"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      dest: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.openssl.cnf"
      mode: "0644"
      content: |
          [ req ]
          distinguished_name = dn
          prompt = no
          x509_extensions = v3_ca

          [ dn ]
          CN = {{ DOMAIN }} Trust Root CA

          [ v3_ca ]
          basicConstraints = critical,CA:TRUE
          keyUsage = critical,keyCertSign,cRLSign
          subjectKeyIdentifier = hash

- name: "PKI | Generate ROOT certificate (self-signed, CA:TRUE)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.command:
      argv:
          - openssl
          - req
          - -x509
          - -new
          - -key
          - "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root-private-USB.key"
          - -passin
          - "env:ROOT_SSL_KEY_PASSPHRASE"
          - -days
          - "{{ ROOT_DAYS | default(3650) }}"
          - -out
          - "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.crt"
          - -config
          - "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.openssl.cnf"
  environment:
      ROOT_SSL_KEY_PASSPHRASE: "{{ ROOT_SSL_KEY_PASSPHRASE }}"

- name: "PKI | Copy ROOT key + cert to secure backup path (USB/offline storage)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      src: "{{ item.src }}"
      dest: "{{ item.dest }}"
      remote_src: true
      mode: "{{ item.mode }}"
  loop:
      - src: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root-private-USB.key"
        dest: "{{ SECURE_BACKUP_PATH }}/{{ DOMAIN }}-root/{{ DOMAIN }}-trust-root-private-USB.key"
        mode: "0600"
      - src: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.crt"
        dest: "{{ SECURE_BACKUP_PATH }}/{{ DOMAIN }}-root/{{ DOMAIN }}-trust-root.crt"
        mode: "0644"

- name: "PKI | Delete local ROOT private key after secure backup"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.file:
      path: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root-private-USB.key"
      state: absent

- name: "PKI | Generate INTERMEDIATE private key (operational signer)"
  delegate_to: localhost
  run_once: true
  become: false
  community.crypto.openssl_privatekey:
      path: "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.key"
      size: 4096
      type: RSA
      mode: "0600"

- name: "PKI | Generate INTERMEDIATE CSR"
  delegate_to: localhost
  run_once: true
  become: false
  community.crypto.openssl_csr:
      path: "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.csr"
      privatekey_path: "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.key"
      subject:
          CN: "{{ DOMAIN }} Signing Intermediate CA"
      mode: "0644"

- name: "PKI | Write intermediate CA extensions file"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      dest: "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.ext"
      mode: "0644"
      content: |
          basicConstraints=critical,CA:TRUE,pathlen:0
          keyUsage=critical,keyCertSign,cRLSign
          subjectKeyIdentifier=hash
          authorityKeyIdentifier=keyid,issuer

- name: "PKI | Sign INTERMEDIATE certificate with ROOT (openssl x509 -req)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.command:
      argv:
          - openssl
          - x509
          - -req
          - -in
          - "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.csr"
          - -CA
          - "{{ SECURE_BACKUP_PATH }}/{{ DOMAIN }}-root/{{ DOMAIN }}-trust-root.crt"
          - -CAkey
          - "{{ SECURE_BACKUP_PATH }}/{{ DOMAIN }}-root/{{ DOMAIN }}-trust-root-private-USB.key"
          - -CAcreateserial
          - -out
          - "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.crt"
          - -days
          - "{{ INTERMEDIATE_DAYS | default(1825) }}"
          - -sha256
          - -extfile
          - "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.ext"
          - -passin
          - env:ROOT_SSL_KEY_PASSPHRASE
  args:
      creates: "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.crt"
  environment:
      ROOT_SSL_KEY_PASSPHRASE: "{{ ROOT_SSL_KEY_PASSPHRASE }}"

- name: "PKI | Create client trust root file (same for all clients)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      src: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.crt"
      dest: "{{ playbook_dir }}/Secrets/certificates/clients/{{ DOMAIN }}-client-trust-root.crt"
      remote_src: true
      mode: "0644"

- name: "PKI | Build client trust bundle (root + intermediate)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.shell: |
      set -euo pipefail
      cat           "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.crt"           "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.crt"           > "{{ playbook_dir }}/Secrets/certificates/clients/{{ DOMAIN }}-client-trust-bundle.crt"
  args:
      executable: /bin/bash
      creates: "{{ playbook_dir }}/Secrets/certificates/clients/{{ DOMAIN }}-client-trust-bundle.crt"

- name: "PKI | Create per-client directories"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.file:
      path: "{{ playbook_dir }}/Secrets/certificates/clients/{{ item }}"
      state: directory
      mode: "0755"
  loop: "{{ client_machines }}"

- name: "PKI | Copy client trust root into each client folder"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      src: "{{ playbook_dir }}/Secrets/certificates/clients/{{ DOMAIN }}-client-trust-root.crt"
      dest: "{{ playbook_dir }}/Secrets/certificates/clients/{{ item }}/{{ DOMAIN }}-client-trust-root.crt"
      remote_src: true
      mode: "0644"
  loop: "{{ client_machines }}"

- name: "PKI | Copy client trust bundle into each client folder"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      src: "{{ playbook_dir }}/Secrets/certificates/clients/{{ DOMAIN }}-client-trust-bundle.crt"
      dest: "{{ playbook_dir }}/Secrets/certificates/clients/{{ item }}/{{ DOMAIN }}-client-trust-bundle.crt"
      remote_src: true
      mode: "0644"
  loop: "{{ client_machines }}"

###############################################################################
# 1b) Single wildcard server cert (*.{{ DOMAIN }} plus {{ DOMAIN }})
###############################################################################

- name: "PKI | Generate wildcard server private key"
  delegate_to: localhost
  run_once: true
  become: false
  community.crypto.openssl_privatekey:
      path: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.key"
      size: 2048
      type: RSA
      mode: "0600"

- name: "PKI | Generate wildcard server CSR"
  delegate_to: localhost
  run_once: true
  become: false
  community.crypto.openssl_csr:
      path: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.csr"
      privatekey_path: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.key"
      subject:
          CN: "*.{{ DOMAIN }}"
      mode: "0644"

- name: "PKI | Write wildcard server SAN extension file"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      dest: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.ext"
      mode: "0644"
      content: |
          basicConstraints=critical,CA:FALSE
          keyUsage=critical,digitalSignature,keyEncipherment
          extendedKeyUsage=serverAuth
          subjectKeyIdentifier=hash
          authorityKeyIdentifier=keyid,issuer
          subjectAltName=DNS:{{ DOMAIN }},DNS:*.{{ DOMAIN }}

- name: "PKI | Sign wildcard server certificate with INTERMEDIATE (openssl x509 -req)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.command:
      argv:
          - openssl
          - x509
          - -req
          - -in
          - "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.csr"
          - -CA
          - "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.crt"
          - -CAkey
          - "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.key"
          - -CAcreateserial
          - -out
          - "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.crt"
          - -days
          - "{{ SERVER_DAYS | default(825) }}"
          - -sha256
          - -extfile
          - "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.ext"
  args:
      creates: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.crt"

- name: "PKI | Build wildcard fullchain (server cert + intermediate; no root)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.shell: |
      set -euo pipefail
      cat           "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.crt"           "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.crt"           > "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.fullchain.crt"
  args:
      executable: /bin/bash
      creates: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.fullchain.crt"

- name: "PKI | Build wildcard chain-only file (intermediate only)"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.copy:
      src: "{{ playbook_dir }}/Secrets/certificates/intermediate/{{ DOMAIN }}-signing-intermediate.crt"
      dest: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.chain.crt"
      remote_src: true
      mode: "0644"

- name: "PKI | Verify wildcard certificate contents"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.command:
      argv:
          - openssl
          - x509
          - -in
          - "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.crt"
          - -text
          - -noout
  register: wildcard_cert_dump
  changed_when: false

- name: "PKI | Assert wildcard certificate SAN and EKU are present"
  delegate_to: localhost
  run_once: true
  become: false
  ansible.builtin.assert:
      that:
          - "'DNS:*.{{ DOMAIN }}' in wildcard_cert_dump.stdout"
          - "'DNS:{{ DOMAIN }}' in wildcard_cert_dump.stdout"
          - "'TLS Web Server Authentication' in wildcard_cert_dump.stdout"
      fail_msg: "Wildcard cert is missing expected SAN or serverAuth EKU."

###############################################################################
# 2) DNS on server: dnsmasq answering domain over WireGuard
###############################################################################

- name: "DNS | Install dnsmasq on server"
  become: true
  ansible.builtin.dnf:
      name: dnsmasq
      state: present

- name: "DNS | Configure dnsmasq to listen on WireGuard IP and serve VPN domains"
  become: true
  ansible.builtin.copy:
      dest: /etc/dnsmasq.d/{{ DOMAIN }}.conf
      owner: root
      group: root
      mode: "0644"
      content: |
        bind-interfaces
        listen-address={{ WG_SERVER_IP }}
        domain-needed
        bogus-priv
        no-resolv
        local=/kef.internal/
        server=185.12.64.2
        server=185.12.64.1

        {% for d in VPN_DOMAINS %}
        address=/{{ d }}/{{ WG_SERVER_IP }}
        {% endfor %}

- name: "DNS | Enable and restart dnsmasq"
  become: true
  ansible.builtin.systemd:
      name: dnsmasq
      enabled: true
      state: restarted

###############################################################################
# 3) Install certs on server for nginx (compatible with existing 06B nginx conf)
###############################################################################

- name: "Nginx VPN TLS | Ensure server cert directory exists"
  become: true
  ansible.builtin.file:
      path: /etc/pki/nginx/{{ DOMAIN }}
      state: directory
      owner: root
      group: root
      mode: "0755"

- name: "Nginx VPN TLS | Install Root CA cert on server"
  become: true
  ansible.builtin.copy:
      src: "{{ playbook_dir }}/Secrets/certificates/root/{{ DOMAIN }}-trust-root.crt"
      dest: /etc/pki/nginx/{{ DOMAIN }}/ca.crt
      owner: root
      group: root
      mode: "0644"

- name: "Nginx VPN TLS | Install wildcard fullchain cert on server"
  become: true
  ansible.builtin.copy:
      src: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.fullchain.crt"
      dest: "/etc/pki/nginx/{{ DOMAIN }}/wildcard.crt"
      owner: root
      group: root
      mode: "0644"

- name: "Nginx VPN TLS | Install wildcard private key on server"
  become: true
  ansible.builtin.copy:
      src: "{{ playbook_dir }}/Secrets/certificates/server/wildcard/{{ DOMAIN }}-server-wildcard.key"
      dest: "/etc/pki/nginx/{{ DOMAIN }}/wildcard.key"
      owner: root
      group: root
      mode: "0600"

###############################################################################
# 4) Nginx: VPN-only bind + allow/deny subnet + per-service vhosts
#    (this is your existing 06B content; left as-is)
###############################################################################

- name: "Nginx VPN-only | Write SSL parameters snippet"
  become: true
  ansible.builtin.copy:
      dest: /etc/nginx/default.d/ssl-params.conf
      owner: root
      group: root
      mode: "0644"
      content: |
          ssl_protocols TLSv1.3 TLSv1.2;
          ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
          ssl_ecdh_curve X25519:secp384r1;
          ssl_session_timeout  90m;
          ssl_session_cache shared:SSL:10m;
          ssl_session_tickets off;

          add_header X-Frame-Options DENY;
          add_header X-Content-Type-Options nosniff;
          add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

- name: "Nginx VPN-only | Restrict access to VPN subnet (and a few others)"
  become: true
  ansible.builtin.copy:
      dest: /etc/nginx/default.d/restrict.conf
      owner: root
      group: root
      mode: "0644"
      content: |
          allow {{ WG_SUBNET_CIDR }};
          allow {{ LOCALIP }};
          allow 144.202.11.118;
          deny all;

- name: "Nginx VPN-only | Force global port 80 listener to bind only on WG IP"
  become: true
  ansible.builtin.replace:
      path: /etc/nginx/nginx.conf
      regexp: '^\s*listen\s+80;\s*$'
      replace: "            listen       {{ WG_SERVER_IP }}:80;"
  notify: Reload nginx

- name: "Nginx VPN-only | Remove IPv6 global port 80 listener (if present)"
  become: true
  ansible.builtin.replace:
      path: /etc/nginx/nginx.conf
      regexp: '^\s*listen\s+\[::\]:80;\s*$'
      replace: ""
  notify: Reload nginx

- name: "Nginx VPN-only | Catch-all default vhost on WG IP (redirect to HTTPS)"
  become: true
  ansible.builtin.copy:
      dest: /etc/nginx/conf.d/default.conf
      owner: root
      group: root
      mode: "0644"
      content: |
        server {
            listen {{ WG_SERVER_IP }}:80 default_server;
            server_name _;
            return 301 https://$host$request_uri;
        }

        server {
            listen {{ WG_SERVER_IP }}:443 ssl default_server;
            http2 on;
            server_name _;

            ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
            ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;

            return 444;
        }
  notify: Reload nginx

- name: "Nginx VPN-only | Write per-service nginx vhosts (listen only on WG IP)"
  become: true
  ansible.builtin.copy:
      dest: "/etc/nginx/conf.d/{{ item }}.conf"
      owner: root
      group: root
      mode: "0644"
      content: |
        server {
            listen {{ WG_SERVER_IP }}:80;
            server_name {{ item }};
            return 301 https://$host$request_uri;
        }

        server {
            listen {{ WG_SERVER_IP }}:443 ssl;
            server_name {{ item }};
            root /var/www/html/{{ item }};
              ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
              ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;

            include /etc/nginx/default.d/*.conf;

            location / {
                try_files $uri $uri/ =404;
            }
        }
  loop: "{{ VPN_DOMAINS }}"
  notify: Reload nginx

###############################################################################
# 4b) Placeholder web roots for each vhost
###############################################################################

- name: "Web root | Ensure per-domain web roots exist"
  become: true
  ansible.builtin.file:
      path: "/var/www/html/{{ item }}"
      state: directory
      owner: nginx
      group: nginx
      mode: "0755"
  loop: "{{ VPN_DOMAINS }}"

- name: "Web root | Write placeholder index.html per domain"
  become: true
  ansible.builtin.copy:
      dest: "/var/www/html/{{ item }}/index.html"
      owner: nginx
      group: nginx
      mode: "0644"
      content: |
          <!doctype html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>{{ item }}</title>
          </head>
          <body>
              <h1>{{ item }}</h1>
              <p>Placeholder page (VPN-only).</p>
          </body>
          </html>
  loop: "{{ VPN_DOMAINS }}"

###############################################################################
# 5) Firewall (your existing 06B content; left as-is)
###############################################################################

- name: "UFW | Allow DNS from VPN subnet"
  become: true
  ansible.builtin.shell: |
      set -euo pipefail
      ufw allow from {{ WG_SUBNET_CIDR }} to any port 53 proto udp
      ufw allow from {{ WG_SUBNET_CIDR }} to any port 53 proto tcp
  args:
      executable: /bin/bash
  changed_when: false

- name: "UFW | Allow HTTP/HTTPS only from VPN subnet, deny globally"
  become: true
  ansible.builtin.shell: |
      set -euo pipefail
      ufw allow from {{ WG_SUBNET_CIDR }} to any port 80 proto tcp
      ufw allow from {{ WG_SUBNET_CIDR }} to any port 443 proto tcp
      ufw deny 80/tcp
      ufw deny 443/tcp
  args:
      executable: /bin/bash
  changed_when: false
