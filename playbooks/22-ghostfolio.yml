# --------------------------------------------------------------------
# Env file for the Ghostfolio container.
# Ghostfolio supports DATABASE_URL + POSTGRES_* + REDIS_* + JWT_SECRET_KEY + PORT etc. :contentReference[oaicite:4]{index=4}
# --------------------------------------------------------------------
- name: Ghostfolio | Ensure env dir exists
  ansible.builtin.file:
    path: "{{ GHOSTFOLIO_ENV_DIR }}"
    state: directory
    owner: root
    group: "{{ GHOSTFOLIO_USER }}"
    mode: "0750"

- name: Ghostfolio | Write env file
  ansible.builtin.copy:
    dest: "{{ GHOSTFOLIO_ENV_FILE }}"
    owner: root
    group: "{{ GHOSTFOLIO_USER }}"
    mode: "0640"
    content: |
      # Ghostfolio
      PORT={{ GHOSTFOLIO_LISTEN_PORT }}
      HOST=0.0.0.0
      ROOT_URL=https://{{ GHOSTFOLIO_HOST }}

      DATABASE_URL=postgresql://{{ GHOSTFOLIO_PG_USER }}:{{ GHOSTFOLIO_PG_PASSWORD }}@{{ GHOSTFOLIO_PG_HOST }}:{{ GHOSTFOLIO_PG_PORT }}/{{ GHOSTFOLIO_PG_DB }}?sslmode=prefer

      JWT_SECRET_KEY={{ GHOSTFOLIO_JWT_SECRET_KEY }}

      REDIS_HOST=127.0.0.1
      REDIS_PORT=6379
      REDIS_DB=0

      ACCESS_TOKEN_SALT={{ GHOSTFOLIO_SALT }}

# --------------------------------------------------------------------
# Quadlets (rootless): a pod + redis + ghostfolio containers
# --------------------------------------------------------------------

- name: Ghostfolio | Pod quadlet
  ansible.builtin.copy:
    dest: "{{ GHOSTFOLIO_QUADLET_DIR }}/{{ GHOSTFOLIO_POD_NAME }}.pod"
    owner: "{{ GHOSTFOLIO_USER }}"
    group: "{{ GHOSTFOLIO_USER }}"
    mode: "0644"
    content: |
      [Unit]
      Description=Ghostfolio Pod

      [Pod]
      PodName={{ GHOSTFOLIO_POD_NAME }}
      Network={{ GHOSTFOLIO_NET_NAME }}

      # Publish to host; nginx reverse proxies to this.
      PublishPort={{ GHOSTFOLIO_LISTEN_PORT }}:{{ GHOSTFOLIO_LISTEN_PORT }}

      [Install]
      WantedBy=default.target


- name: Ghostfolio | Redis quadlet
  ansible.builtin.copy:
    dest: "{{ GHOSTFOLIO_QUADLET_DIR }}/{{ GHOSTFOLIO_POD_NAME }}-redis.container"
    owner: "{{ GHOSTFOLIO_USER }}"
    group: "{{ GHOSTFOLIO_USER }}"
    mode: "0644"
    content: |
      [Unit]
      Description=Ghostfolio Redis (in-pod)
      Requires={{ GHOSTFOLIO_POD_NAME }}-pod.service
      After={{ GHOSTFOLIO_POD_NAME }}-pod.service

      [Container]
      ContainerName={{ GHOSTFOLIO_POD_NAME }}_redis
      Image={{ GHOSTFOLIO_REDIS_IMAGE }}
      AutoUpdate=registry
      PodmanArgs=--pod {{ GHOSTFOLIO_POD_NAME }}

      [Install]
      WantedBy=default.target


- name: Ghostfolio | App quadlet
  ansible.builtin.copy:
    dest: "{{ GHOSTFOLIO_QUADLET_DIR }}/{{ GHOSTFOLIO_POD_NAME }}.container"
    owner: "{{ GHOSTFOLIO_USER }}"
    group: "{{ GHOSTFOLIO_USER }}"
    mode: "0644"
    content: |
      [Unit]
      Description=Ghostfolio
      Requires={{ GHOSTFOLIO_POD_NAME }}-pod.service
      After={{ GHOSTFOLIO_POD_NAME }}-pod.service
      Requires={{ GHOSTFOLIO_POD_NAME }}-redis.service
      After={{ GHOSTFOLIO_POD_NAME }}-redis.service

      [Container]
      ContainerName={{ GHOSTFOLIO_POD_NAME }}
      Image={{ GHOSTFOLIO_IMAGE }}
      AutoUpdate=registry
      EnvironmentFile={{ GHOSTFOLIO_ENV_FILE }}
      PodmanArgs=--pod {{ GHOSTFOLIO_POD_NAME }}

      [Install]
      WantedBy=default.target



- name: Ghostfolio | Ensure podman network exists (rootless)
  become: true
  become_user: "{{ GHOSTFOLIO_USER }}"
  changed_when: false
  ansible.builtin.shell: |
    set -euo pipefail
    podman network exists "{{ GHOSTFOLIO_NET_NAME }}" || podman network create "{{ GHOSTFOLIO_NET_NAME }}"

- name: "Ghostfolio | systemd --user daemon-reload"
  become: true
  become_user: "{{ GHOSTFOLIO_USER }}"
  ansible.builtin.command: "systemctl --user daemon-reload"
  environment:
    XDG_RUNTIME_DIR: "{{ GHOSTFOLIO_XDG_RUNTIME_DIR }}"
    DBUS_SESSION_BUS_ADDRESS: "{{ GHOSTFOLIO_DBUS_SESSION_BUS_ADDRESS }}"
  changed_when: false


