---
- name: Ghostfolio | Set derived vars / defaults
  ansible.builtin.set_fact:
    GHOSTFOLIO_USER: "{{ GHOSTFOLIO_USER | default('ghostfolio') }}"
    GHOSTFOLIO_ROOT: "{{ GHOSTFOLIO_ROOT | default('/opt/ghostfolio') }}"
    GHOSTFOLIO_ENV_DIR: "{{ GHOSTFOLIO_ENV_DIR | default('/etc/ghostfolio') }}"
    GHOSTFOLIO_ENV_FILE: "{{ GHOSTFOLIO_ENV_FILE | default('/etc/ghostfolio/ghostfolio.env') }}"
    GHOSTFOLIO_QUADLET_DIR: "{{ GHOSTFOLIO_QUADLET_DIR | default('/home/' ~ (GHOSTFOLIO_USER | default('ghostfolio')) ~ '/.config/containers/systemd') }}"

    GHOSTFOLIO_NET_NAME: "{{ GHOSTFOLIO_NET_NAME | default('ghostfolio_net') }}"
    GHOSTFOLIO_POD_NAME: "{{ GHOSTFOLIO_POD_NAME | default('ghostfolio') }}"

    GHOSTFOLIO_IMAGE: "{{ GHOSTFOLIO_IMAGE | default('docker.io/ghostfolio/ghostfolio:latest') }}"
    GHOSTFOLIO_REDIS_IMAGE: "{{ GHOSTFOLIO_REDIS_IMAGE | default('docker.io/library/redis:7-alpine') }}"

    # Hostname for nginx + ROOT_URL
    GHOSTFOLIO_HOST: "{{ GHOSTFOLIO_HOST | default('ghostfolio.' ~ DOMAIN) }}"

    # Publish Ghostfolio to loopback only; nginx proxies to this.
    GHOSTFOLIO_LISTEN_HOST: "{{ GHOSTFOLIO_LISTEN_HOST | default('127.0.0.1') }}"
    GHOSTFOLIO_LISTEN_PORT: "{{ GHOSTFOLIO_LISTEN_PORT | default(3333) }}"

    # Postgres on the *host* (not in a container). For rootless containers, this is the usual “host gateway” name.
    GHOSTFOLIO_PG_HOST: "{{ GHOSTFOLIO_PG_HOST | default('host.containers.internal') }}"
    GHOSTFOLIO_PG_PORT: "{{ GHOSTFOLIO_PG_PORT | default(5432) }}"
    GHOSTFOLIO_PG_DB: "{{ GHOSTFOLIO_PG_DB | default('ghostfolio') }}"
    GHOSTFOLIO_PG_USER: "{{ GHOSTFOLIO_PG_USER | default('ghostfolio') }}"
    GHOSTFOLIO_PG_PASSWORD: "{{ GHOSTFOLIO_PG_PASSWORD | default(omit) }}"

    # You should set this explicitly (vault/vars). It must be a random string. :contentReference[oaicite:3]{index=3}
    GHOSTFOLIO_JWT_SECRET_KEY: "{{ GHOSTFOLIO_JWT_SECRET_KEY | default(omit) }}"
    GHOSTFOLIO_SALT: "{{ GHOSTFOLIO_SALT | default(omit) }}"

    # Redis runs inside the same pod; reachable via localhost inside the pod network namespace.
    GHOSTFOLIO_REDIS_HOST: "{{ GHOSTFOLIO_REDIS_HOST | default('127.0.0.1') }}"
    GHOSTFOLIO_REDIS_PORT: "{{ GHOSTFOLIO_REDIS_PORT | default(6379) }}"
    GHOSTFOLIO_REDIS_DB: "{{ GHOSTFOLIO_REDIS_DB | default(0) }}"

- name: Ghostfolio | Create system user
  ansible.builtin.user:
    name: "{{ GHOSTFOLIO_USER }}"
    system: true
    create_home: true
    shell: /sbin/nologin

- name: Ghostfolio | Ensure directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ GHOSTFOLIO_ROOT }}", owner: "{{ GHOSTFOLIO_USER }}", group: "{{ GHOSTFOLIO_USER }}", mode: "0750" }
    - { path: "{{ GHOSTFOLIO_ENV_DIR }}", owner: "root", group: "{{ GHOSTFOLIO_USER }}", mode: "0750" }
    - { path: "{{ GHOSTFOLIO_QUADLET_DIR }}", owner: "{{ GHOSTFOLIO_USER }}", group: "{{ GHOSTFOLIO_USER }}", mode: "0755" }

- name: Ghostfolio | Derive runtime dir for user systemd (root controlling rootless)
  block:
    - name: Ghostfolio | Get UID of {{ GHOSTFOLIO_USER }}
      ansible.builtin.command: "id -u {{ GHOSTFOLIO_USER }}"
      register: ghostfolio_uid
      changed_when: false

    - name: Ghostfolio | Set runtime facts
      ansible.builtin.set_fact:
        GHOSTFOLIO_UID: "{{ ghostfolio_uid.stdout | trim }}"
        GHOSTFOLIO_XDG_RUNTIME_DIR: "/run/user/{{ ghostfolio_uid.stdout | trim }}"
        GHOSTFOLIO_DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ ghostfolio_uid.stdout | trim }}/bus"

    - name: Ghostfolio | Ensure XDG runtime dir exists
      ansible.builtin.file:
        path: "{{ GHOSTFOLIO_XDG_RUNTIME_DIR }}"
        state: directory
        owner: "{{ GHOSTFOLIO_USER }}"
        group: "{{ GHOSTFOLIO_USER }}"
        mode: "0700"

    - name: Ghostfolio | Ensure user manager is started (user@UID)
      ansible.builtin.systemd:
        name: "user@{{ GHOSTFOLIO_UID }}.service"
        state: started
  become: true

####################################################################
# Postgres
#####################################################################

- name: "Ghostfolio | Postgres: allow access + create role/db (host Postgres)"
  block:
    - name: "Ghostfolio | Postgres: discover pg_hba.conf path"
      become: true
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ DBPORT | int }} -U postgres -tAc "SHOW hba_file;"
      environment:
        PGPASSWORD: "{{ DBSUPERPASS }}"
      register: ghostfolio_hba_file
      changed_when: false

    # Optional: allow a known podman subnet (only if you track it)
    - name: "Ghostfolio | Postgres: allow podman subnet (ghostfolio -> ghostfolio)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ ghostfolio_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ GHOSTFOLIO_PG_DB }}"
        users: "{{ GHOSTFOLIO_PG_USER }}"
        source: "{{ GHOSTFOLIO_PODMAN_SUBNET }}"
        method: scram-sha-256
        state: present
      when: GHOSTFOLIO_PODMAN_SUBNET is defined

    - name: "Ghostfolio | Postgres: allow podman subnet (postgres -> ghostfolio db admin)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ ghostfolio_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ GHOSTFOLIO_PG_DB }}"
        users: postgres
        source: "{{ GHOSTFOLIO_PODMAN_SUBNET }}"
        method: scram-sha-256
        state: present
      when: GHOSTFOLIO_PODMAN_SUBNET is defined

    # Always allow samehost (matches your existing pattern)
    - name: "Ghostfolio | Postgres: allow samehost (ghostfolio -> ghostfolio)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ ghostfolio_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ GHOSTFOLIO_PG_DB }}"
        users: "{{ GHOSTFOLIO_PG_USER }}"
        source: samehost
        method: scram-sha-256
        state: present

    - name: "Ghostfolio | Postgres: allow samehost (postgres -> ghostfolio db admin)"
      community.postgresql.postgresql_pg_hba:
        dest: "{{ ghostfolio_hba_file.stdout | trim }}"
        contype: host
        databases: "{{ GHOSTFOLIO_PG_DB }}"
        users: postgres
        source: samehost
        method: scram-sha-256
        state: present

    - name: "Ghostfolio | Postgres: reload config"
      become: true
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ DBPORT | int }} -U postgres -tAc "SELECT pg_reload_conf();"
      environment:
        PGPASSWORD: "{{ DBSUPERPASS }}"
      changed_when: false

    - name: "Ghostfolio | Postgres: ensure role exists"
      community.postgresql.postgresql_user:
        login_host: "127.0.0.1"
        login_port: "{{ DBPORT | int }}"
        login_user: postgres
        login_password: "{{ DBSUPERPASS }}"
        name: "{{ GHOSTFOLIO_PG_USER }}"
        password: "{{ GHOSTFOLIO_PG_PASSWORD }}"
        encrypted: true
        state: present

    - name: "Ghostfolio | Postgres: ensure database exists"
      community.postgresql.postgresql_db:
        login_host: "127.0.0.1"
        login_port: "{{ DBPORT | int }}"
        login_user: postgres
        login_password: "{{ DBSUPERPASS }}"
        name: "{{ GHOSTFOLIO_PG_DB }}"
        owner: "{{ GHOSTFOLIO_PG_USER }}"
        state: present
