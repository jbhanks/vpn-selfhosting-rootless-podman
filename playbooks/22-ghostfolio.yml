- name: "Ghostfolio | Start container service (generated; do not enable)"
  become: true
  become_user: "{{ GHOSTFOLIO_USER }}"
  ansible.builtin.command: >
    systemctl --user start
    {{ GHOSTFOLIO_POD_NAME }}-pod.service
    {{ GHOSTFOLIO_POD_NAME }}-redis.service
    {{ GHOSTFOLIO_POD_NAME }}.service
  environment:
    XDG_RUNTIME_DIR: "{{ GHOSTFOLIO_XDG_RUNTIME_DIR }}"
    DBUS_SESSION_BUS_ADDRESS: "{{ GHOSTFOLIO_DBUS_SESSION_BUS_ADDRESS }}"
  changed_when: false


# --------------------------------------------------------------------
# Nginx vhost (host-level reverse proxy)
# --------------------------------------------------------------------
- name: "Ghostfolio | Nginx vhost"
  ansible.builtin.copy:
    dest: "/etc/nginx/conf.d/{{ GHOSTFOLIO_HOST }}.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      server {
          listen {{ WG_SERVER_IP }}:80;
          server_name {{ GHOSTFOLIO_HOST }};
          return 301 https://$host$request_uri;
      }

      server {
          listen {{  WG_SERVER_IP }}:443 ssl;
          http2 on;
          server_name {{ GHOSTFOLIO_HOST }};

          include /etc/nginx/default.d/*.conf;
          ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
          ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;
          access_log  /var/log/nginx/{{ GHOSTFOLIO_HOST }}_access.log  main;
          error_log   /var/log/nginx/{{ GHOSTFOLIO_HOST }}_error.log;

          location / {
              proxy_pass http://{{ GHOSTFOLIO_LISTEN_HOST }}:{{ GHOSTFOLIO_LISTEN_PORT }};
              proxy_http_version 1.1;

              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }

- name: Ghostfolio | nginx reload
  ansible.builtin.service:
    name: nginx
    state: reloaded
