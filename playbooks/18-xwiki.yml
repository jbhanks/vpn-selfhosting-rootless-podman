# If SELinux is enforcing, nginx needs permission to connect to the chosen upstream port.
# This tags the port as http_port_t. (Safe even if you later proxy other apps on the same port.)
- name: XWiki allow nginx to proxy to local port on SELinux systems
  ansible.builtin.command: semanage port -a -t http_port_t -p tcp {{ XWIKI_HTTP_PORT }}
  register: xwiki_semanage_add
  changed_when: xwiki_semanage_add.rc == 0
  failed_when: xwiki_semanage_add.rc != 0 and ("already defined" not in (xwiki_semanage_add.stderr | default('')))
  when: ansible_facts.selinux is defined and ansible_facts.selinux.status == "enabled"

- name: XWiki write nginx vhost
  ansible.builtin.copy:
    dest: "{{ XWIKI_NGINX_CONF }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Redirect http to https
      server {
          listen {{ WG_SERVER_IP }}:80;
          server_name {{ XWIKI_HOST }};
          return 301 https://$host$request_uri;
      }
      server {
          listen {{  WG_SERVER_IP }}:443 ssl;
          http2 on;
          server_name {{ XWIKI_HOST }};

          # Match your existing nginx layout (your template tasks likely drop shared TLS params here)
          include /etc/nginx/default.d/*.conf;
          ssl_certificate     /etc/pki/nginx/{{ DOMAIN }}/wildcard.crt;
          ssl_certificate_key /etc/pki/nginx/{{ DOMAIN }}/wildcard.key;
          access_log /var/log/nginx/{{ XWIKI_HOST }}_access.log main;
          error_log  /var/log/nginx/{{ XWIKI_HOST }}_error.log warn;
          client_max_body_size 100m;

          location / {
              proxy_pass http://127.0.0.1:{{ XWIKI_HTTP_PORT }};
              proxy_http_version 1.1;

              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;

              proxy_read_timeout 300;
              proxy_send_timeout 300;
          }
      }

- name: XWiki reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded
