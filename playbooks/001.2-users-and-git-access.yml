---
- name: Append common bashrc block
  ansible.builtin.blockinfile:
    path: /etc/skel/.bashrc
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE COMMON BASHRC"
    block: "{{ lookup('ansible.builtin.file', 'blocks/bashrc-common.txt') }}"

- name: Append common nanorc block
  ansible.builtin.blockinfile:
    path: .nanorc
    create: true
    mode: "0644"
    marker: "\" {mark} ANSIBLE COMMON NANORC"
    block: "{{ lookup('ansible.builtin.file', 'blocks/nanorc-common.txt') }}"

- name: Append common vimrc block
  ansible.builtin.blockinfile:
    path: .vimrc
    create: true
    mode: "0644"
    marker: "\" {mark} ANSIBLE COMMON VIMRC"
    block: "{{ lookup('ansible.builtin.file', 'blocks/vimrc-common.txt') }}"

- name: Copy .zshrc
  ansible.builtin.copy:
    src: files/zshrc-common.txt
    dest: /etc/skel/.zshrc
    owner: root
    group: root
    mode: "0644"

- name: "Ensure .zshrc.d exists"
  become: false
  ansible.builtin.file:
    path: ~/.zshrc.d
    state: directory
    mode: "0755"

- name: "Add .local/bin to PATH"
  become: false
  ansible.builtin.lineinfile:
    path: ~/.zshrc.d/vars.zsh
    create: true
    line: "export PATH=$PATH:/home/{{ ansible_user }}/.local/bin"

- name: "Ensure cryptography is available for openssh_keypair (RHEL/Alma)"
  ansible.builtin.dnf:
    name: python3-cryptography
    state: present

- name: "Ensure bcrypt is available for openssh_keypair (RHEL/Alma)"
  ansible.builtin.dnf:
    name: python3-bcrypt
    state: present

####################################################################
# Canonical outbound Git SSH key
####################################################################
- name: "Canonical outbound Git SSH key"
  block:
    - name: "Ensure canonical SSH key directory exists"
      ansible.builtin.file:
        path: /etc/ssh/client_keys
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: "Generate canonical SSH keypair for Gitea"
      community.crypto.openssh_keypair:
        path: "/etc/ssh/client_keys/ed25519_{{ DOMAIN }}"
        type: ed25519
        comment: "{{ ADMINUSER }}@{{ DOMAIN }}"
        passphrase: "{{ GITSSHPHRASE }}"
        owner: root
        group: root
        mode: "0600"
        regenerate: never
      register: gitea_keypair

    - name: "Lock down canonical public key perms"
      ansible.builtin.file:
        path: "/etc/ssh/client_keys/ed25519_{{ DOMAIN }}.pub"
        owner: root
        group: root
        mode: "0644"

####################################################################
# Root SSH setup for outbound Git
####################################################################
- name: "Root outbound Git SSH setup"
  block:
    - name: "Ensure root .ssh exists with secure perms"
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: "Copy canonical private key to root"
      ansible.builtin.copy:
        src: "/etc/ssh/client_keys/ed25519_{{ DOMAIN }}"
        dest: "/root/.ssh/ed25519_{{ DOMAIN }}"
        owner: root
        group: root
        mode: "0600"
        remote_src: true

    - name: "Copy canonical public key to root"
      ansible.builtin.copy:
        src: "/etc/ssh/client_keys/ed25519_{{ DOMAIN }}.pub"
        dest: "/root/.ssh/ed25519_{{ DOMAIN }}.pub"
        owner: root
        group: root
        mode: "0644"
        remote_src: true

    - name: "Seed root SSH config to use copied Gitea key"
      ansible.builtin.copy:
        dest: /root/.ssh/config
        owner: root
        group: root
        mode: "0600"
        content: |
          Host {{ GITEAHOST }}
              HostName {{ GITEAHOST }}
              IdentityFile ~/.ssh/ed25519_{{ DOMAIN }}
              IdentitiesOnly yes
              User git
              Port {{ GITSSHPORT }}

    - name: "Create root askpass.sh with Git SSH passphrase"
      ansible.builtin.copy:
        dest: /root/.ssh/askpass.sh
        owner: root
        group: root
        mode: "0700"
        content: |
          #!/bin/sh
          echo "{{ GITSSHPHRASE }}"

- name: "Display canonical public key to add to Gitea (first run only)"
  ansible.builtin.command: "cat /etc/ssh/client_keys/ed25519_{{ DOMAIN }}.pub"
  register: gitea_pubkey
  changed_when: false
  when: gitea_keypair.changed

- name: "Show public key and prompt for manual addition (first run only)"
  when: gitea_keypair.changed
  block:
    - name: "Ask user for confirmation"
      ansible.builtin.pause:
        prompt: |
          The following public key must be manually added to your Git host ({{ GITEAHOST }}):
          {{ gitea_pubkey.stdout }}
          Once added via the web UI, type 'yes' to continue or 'no' to abort:
        echo: true
      register: user_confirmation
      until: user_confirmation.user_input is match("^(yes|no)$")
      retries: 9999
      delay: 0

    - name: "Fail if user said no"
      ansible.builtin.fail:
        msg: "User chose not to continue."
      when: user_confirmation.user_input == "no"

- name: "Fail if user has not confirmed key addition (only when prompted)"
  ansible.builtin.fail:
    msg: "User did not confirm SSH key was added to Gitea."
  when:
    - gitea_keypair.changed
    - user_confirmation.user_input | lower != "yes"

####################################################################
# Create users
####################################################################
- name: Create ADMINUSER
  ansible.builtin.user:
    name: "{{ ADMINUSER }}"
    create_home: true
    skeleton: /etc/skel
    shell: /bin/bash

- name: Set password for {{ ADMINUSER }}
  ansible.builtin.user:
    name: "{{ ADMINUSER }}"
    password: "{{ ADMINPW | password_hash('sha512') }}"
    update_password: always

- name: Create APPS (no authorized_keys)
  ansible.builtin.user:
    name: "{{ item }}"
    create_home: true
    skeleton: /etc/skel
    shell: /bin/bash
    password_lock: true
  loop: "{{ [APPUSER] + APPS }}"
####################################################################
# Shared loop target for outbound Git SSH users
####################################################################
- name: Define outbound Git SSH users
  ansible.builtin.set_fact:
    GIT_SSH_USERS: "{{ [ADMINUSER, APPUSER] }}"

####################################################################
# Allow ADMINUSER + APPUSER to SSH using root authorized_keys
####################################################################
- name: "Setup outbound Git SSH for users"
  ansible.builtin.include_tasks: tasks/setup_git_ssh_user.yml
  loop: "{{ GIT_SSH_USERS }}"
  loop_control:
    loop_var: sshuser


- name: Enable lingering for rootless service users (APPUSER + APPS)
  ansible.builtin.command: "loginctl enable-linger {{ item }}"
  loop: "{{ [APPUSER] + APPS }}"
  changed_when: false
  failed_when: false

- name: Remove any authorized_keys for APPS
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh/authorized_keys"
    state: absent
  loop: "{{ [APPUSER] + APPS }}"

- name: Ensure .ssh exists for all APPS
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0700"
  loop: "{{ [APPUSER] + APPS }}"

####################################################################
# Sanity checks: ensure created users have sane primary IDs/groups
# (Catch account issues here, before later playbooks depend on them)
####################################################################

- name: Sanity | Get primary UID for ADMINUSER + APPUSER + APPS
  ansible.builtin.command: "id -u {{ item }}"
  register: sanity_user_uid
  changed_when: false
  loop: "{{ [ADMINUSER] + [APPUSER] + APPS }}"

- name: Sanity | Get primary GID for ADMINUSER + APPUSER + APPS
  ansible.builtin.command: "id -g {{ item }}"
  register: sanity_user_gid
  changed_when: false
  loop: "{{ [ADMINUSER] + [APPUSER] + APPS }}"

- name: Sanity | Get primary group name for ADMINUSER + APPUSER + APPS
  ansible.builtin.command: "id -gn {{ item }}"
  register: sanity_user_gname
  changed_when: false
  loop: "{{ [ADMINUSER] + [APPUSER] + APPS }}"

- name: Sanity | Assert users exist and are not UID 0 / GID 0
  ansible.builtin.assert:
    that:
      - (sanity_user_uid.results[ansible_loop.index0].stdout | int) != 0
      - (sanity_user_gid.results[ansible_loop.index0].stdout | int) != 0
    fail_msg: >-
      Bad user identity for {{ item }}:
      uid={{ sanity_user_uid.results[ansible_loop.index0].stdout | default('') }},
      gid={{ sanity_user_gid.results[ansible_loop.index0].stdout | default('') }}.
      Refusing to continue.
  loop: "{{ [ADMINUSER] + [APPUSER] + APPS }}"
  loop_control:
    extended: true

- name: Sanity | Get primary group name for APPUSER + APPS
  ansible.builtin.command: "id -gn {{ item }}"
  register: sanity_apps_gname
  changed_when: false
  loop: "{{ [APPUSER] + APPS }}"

- name: Sanity | Assert APPUSER + APPS have per-user primary group
  ansible.builtin.assert:
    that:
      - sanity_apps_gname.results[ansible_loop.index0].stdout == item
    fail_msg: >-
      User {{ item }} does not have a per-user primary group.
      expected_group={{ item }} actual_group={{ sanity_apps_gname.results[ansible_loop.index0].stdout | default('') }}
  loop: "{{ [APPUSER] + APPS }}"
  loop_control:
    extended: true

########## Set up data folders for users
- name: Ensure a data directory exists on the data volumefor each APPS user
  ansible.builtin.file:
    path: "{{ BLOCKDEV }}/{{ item }}"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0750"
  loop: "{{ APPS }}"

#######

- name: Set local console password for root
  ansible.builtin.user:
    name: root
    password: "{{ CONSOLE_ROOT_PASSWORD | password_hash('sha512') }}"
    update_password: always

- name: Ensure proper ownership of home directories
  ansible.builtin.file:
    path: "/home/{{ item }}"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
  loop: "{{ [ADMINUSER] + [APPUSER] + APPS }}"

- name: Ensure home directories are 0711 (admin sanity mode)
  ansible.builtin.file:
    path: "/home/{{ item }}"
    mode: "0711"
  loop: "{{ [ADMINUSER] + [APPUSER] + APPS }}"

- name: Set permissions on .ssh directories
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh"
    mode: "0700"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
  loop: "{{ [ADMINUSER] + [APPUSER] + APPS }}"